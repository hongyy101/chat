<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>极简微信 · 实时聊天</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        html, body {
            height: 100%;
            width: 100%;
            overflow: hidden;
            background: #d9d9d9;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 10px;
        }

        .chat-frame {
            width: 400px;
            height: 720px;
            max-height: 95vh;
            background-color: #f0f0f0;
            border-radius: 28px;
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.2);
            display: flex;
            flex-direction: column;
            border: 1px solid rgba(255, 255, 255, 0.3);
            overflow: hidden;
        }

        .simple-header {
            background-color: #1f8b4c;
            padding: 16px 18px;
            color: white;
            font-size: 20px;
            font-weight: 600;
            border-bottom: 1px solid #15733e;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
        }

        .connection-status {
            font-size: 12px;
            padding: 4px 10px;
            background-color: rgba(255,255,255,0.2);
            border-radius: 30px;
            font-weight: 400;
        }

        .chat-main {
            flex: 1;
            background-color: #e6e6e6;
            padding: 20px 14px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 18px;
            -webkit-overflow-scrolling: touch;
        }

        .time-label {
            text-align: center;
            font-size: 11px;
            color: #6f6f6f;
            margin: 5px 0;
        }
        .time-label span {
            background-color: rgba(200, 200, 200, 0.5);
            padding: 4px 14px;
            border-radius: 30px;
            font-weight: 500;
            display: inline-block;
        }

        .message-row {
            display: flex;
            width: 100%;
        }

        .message-row.left {
            justify-content: flex-start;
        }

        .message-row.right {
            justify-content: flex-end;
        }

        .message-wrapper {
            max-width: 280px;
        }

        .bubble {
            padding: 10px 16px;
            font-size: 15px;
            line-height: 1.5;
            word-wrap: break-word;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.07);
        }

        .left .bubble {
            background-color: #ffffff;
            border-radius: 20px 20px 20px 6px;
            color: #1a1a1a;
        }

        .right .bubble {
            background: linear-gradient(135deg, #9ee66b, #7ed34d);
            border-radius: 20px 20px 6px 20px;
            color: #111;
        }

        .message-footer {
            display: flex;
            margin-top: 3px;
            font-size: 10px;
            color: #8b8b8b;
        }

        .left .message-footer {
            justify-content: flex-start;
            padding-left: 8px;
        }

        .right .message-footer {
            justify-content: flex-end;
            padding-right: 4px;
        }

        .input-area {
            background-color: #f4f4f4;
            border-top: 1px solid #c2c2c2;
            padding: 12px 16px;
            display: flex;
            gap: 10px;
            align-items: center;
            flex-shrink: 0;
        }

        .input-wrapper {
            flex: 1;
            background-color: white;
            border-radius: 26px;
            padding: 8px 16px;
            border: 1px solid #bcbcbc;
            display: flex;
            align-items: center;
        }

        .input-wrapper input {
            border: none;
            outline: none;
            width: 100%;
            font-size: 16px;
            background: transparent;
            padding: 4px 0;
        }

        .send-btn {
            background-color: #1f8b4c;
            color: white;
            border: none;
            padding: 10px 24px;
            border-radius: 40px;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            border: 1px solid #106b36;
            white-space: nowrap;
            min-width: 70px;
        }

        .send-btn:active {
            opacity: 0.8;
        }

        .system-message {
            text-align: center;
            font-size: 11px;
            color: #888;
            margin: 5px 0;
            font-style: italic;
        }

        @media (max-width: 500px) {
            body {
                padding: 0;
            }
            .chat-frame {
                width: 100%;
                height: 100%;
                max-height: 100vh;
                border-radius: 0;
            }
        }
    </style>
</head>
<body>
    <div class="chat-frame">
        <div class="simple-header">
            <span>💬 实时聊天</span>
            <span class="connection-status" id="status">连接中...</span>
        </div>

        <div class="chat-main" id="chatMain">
            <div class="time-label"><span>聊天开始</span></div>
            <div class="system-message" id="welcomeMsg">👋 连接服务器...</div>
        </div>

        <div class="input-area">
            <div class="input-wrapper">
                <input type="text" id="messageInput" placeholder="输入消息..." autocomplete="off">
            </div>
            <button class="send-btn" id="sendBtn">发送</button>
        </div>
    </div>

    <script>
        // 简单直接的实现
        (function() {
            const chatMain = document.getElementById('chatMain');
            const messageInput = document.getElementById('messageInput');
            const sendBtn = document.getElementById('sendBtn');
            const statusSpan = document.getElementById('status');
            const welcomeMsg = document.getElementById('welcomeMsg');
            
            let ws = null;
            let reconnectTimeout = null;

            // 获取当前时间
            function getTime() {
                const d = new Date();
                return `${d.getHours().toString().padStart(2, '0')}:${d.getMinutes().toString().padStart(2, '0')}`;
            }

            // 添加消息
            function addMsg(text, isSelf) {
                const row = document.createElement('div');
                row.className = `message-row ${isSelf ? 'right' : 'left'}`;
                
                const wrapper = document.createElement('div');
                wrapper.className = 'message-wrapper';
                
                const bubble = document.createElement('div');
                bubble.className = 'bubble';
                bubble.textContent = text;
                
                const footer = document.createElement('div');
                footer.className = 'message-footer';
                footer.textContent = getTime();
                
                wrapper.appendChild(bubble);
                wrapper.appendChild(footer);
                row.appendChild(wrapper);
                chatMain.appendChild(row);
                
                // 滚动到底部
                chatMain.scrollTop = chatMain.scrollHeight;
            }

            // 添加系统消息
            function addSysMsg(text) {
                const sys = document.createElement('div');
                sys.className = 'system-message';
                sys.textContent = text;
                chatMain.appendChild(sys);
                chatMain.scrollTop = chatMain.scrollHeight;
            }

            // 更新状态
            function setStatus(text, color) {
                statusSpan.textContent = text;
                if (color) {
                    statusSpan.style.backgroundColor = color;
                }
            }

            // 连接WebSocket
            function connect() {
                // 清除之前的重连定时器
                if (reconnectTimeout) {
                    clearTimeout(reconnectTimeout);
                    reconnectTimeout = null;
                }

                // 关闭旧连接
                if (ws) {
                    try {
                        ws.onopen = null;
                        ws.onmessage = null;
                        ws.onclose = null;
                        ws.onerror = null;
                        ws.close();
                    } catch (e) {}
                    ws = null;
                }

                setStatus('⏳ 连接中...', 'rgba(255, 193, 7, 0.3)');
                
                const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
                const wsUrl = `${protocol}//${window.location.host}/ws`;
                
                try {
                    ws = new WebSocket(wsUrl);
                } catch (e) {
                    console.error('创建WebSocket失败:', e);
                    setStatus('🔴 失败', 'rgba(231, 76, 60, 0.3)');
                    reconnectTimeout = setTimeout(connect, 3000);
                    return;
                }

                ws.onopen = function() {
                    console.log('连接成功');
                    setStatus('🟢 在线', 'rgba(46, 204, 113, 0.3)');
                    addSysMsg('✅ 已连接到服务器');
                    if (welcomeMsg && welcomeMsg.parentNode) {
                        welcomeMsg.remove();
                    }
                    messageInput.disabled = false;
                    messageInput.placeholder = '输入消息...';
                };

                ws.onmessage = function(e) {
                    try {
                        const data = JSON.parse(e.data);
                        addMsg(data.message, data.isSelf);
                    } catch (err) {
                        console.error('解析消息失败:', err);
                    }
                };

                ws.onclose = function(e) {
                    console.log('连接关闭', e.code, e.reason);
                    setStatus('🔴 离线', 'rgba(231, 76, 60, 0.3)');
                    addSysMsg('⚠️ 连接断开，正在重连...');
                    messageInput.disabled = true;
                    messageInput.placeholder = '连接断开...';
                    
                    // 3秒后重连
                    reconnectTimeout = setTimeout(connect, 3000);
                };

                ws.onerror = function(e) {
                    console.error('WebSocket错误:', e);
                };
            }

            // 发送消息
            function send() {
                const msg = messageInput.value.trim();
                if (!msg) return;
                
                if (!ws || ws.readyState !== WebSocket.OPEN) {
                    addSysMsg('⚠️ 连接未建立，正在重连...');
                    connect();
                    return;
                }
                
                try {
                    ws.send(msg);
                    messageInput.value = '';
                } catch (e) {
                    console.error('发送失败:', e);
                    addSysMsg('❌ 发送失败，正在重连...');
                    connect();
                }
            }

            // 事件绑定
            sendBtn.addEventListener('click', send);
            
            messageInput.addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    send();
                }
            });

            // 处理键盘弹出
            messageInput.addEventListener('focus', function() {
                setTimeout(() => {
                    chatMain.scrollTop = chatMain.scrollHeight;
                }, 300);
            });

            window.addEventListener('resize', function() {
                if (document.activeElement === messageInput) {
                    setTimeout(() => {
                        chatMain.scrollTop = chatMain.scrollHeight;
                    }, 100);
                }
            });

            // 开始连接
            connect();
        })();
    </script>
</body>
</html>
