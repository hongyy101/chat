<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>简·简</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        html, body {
            height: 100%;
            width: 100%;
            overflow: hidden;
            background: #d9d9d9;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 10px;
        }

        .chat-frame {
            width: 400px;
            height: 720px;
            max-height: 95vh;
            background-color: #f0f0f0;
            border-radius: 28px;
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.2);
            display: flex;
            flex-direction: column;
            border: 1px solid rgba(255, 255, 255, 0.3);
            overflow: hidden;
        }

        .simple-header {
            background-color: #1f8b4c;
            padding: 16px 18px;
            color: white;
            font-size: 20px;
            font-weight: 600;
            border-bottom: 1px solid #15733e;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
        }

        .connection-status {
            font-size: 12px;
            padding: 4px 10px;
            background-color: rgba(255,255,255,0.2);
            border-radius: 30px;
            font-weight: 400;
        }

        .chat-main {
            flex: 1;
            background-color: #e6e6e6;
            background-image: linear-gradient(145deg, #ebebeb 0%, #dfdfdf 100%);
            padding: 20px 14px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 18px;
            -webkit-overflow-scrolling: touch;
        }

        .time-label {
            text-align: center;
            font-size: 11px;
            color: #6f6f6f;
            margin: 5px 0;
        }
        .time-label span {
            background-color: rgba(200, 200, 200, 0.5);
            padding: 4px 14px;
            border-radius: 30px;
            backdrop-filter: blur(2px);
            font-weight: 500;
            display: inline-block;
        }

        .message-row {
            display: flex;
            width: 100%;
        }

        .message-row.left {
            justify-content: flex-start;
        }

        .message-row.right {
            justify-content: flex-end;
        }

        .message-wrapper {
            max-width: 280px;
        }

        .bubble {
            padding: 10px 16px;
            font-size: 15px;
            line-height: 1.5;
            word-wrap: break-word;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.07);
        }

        .left .bubble {
            background-color: #ffffff;
            border-radius: 20px 20px 20px 6px;
            color: #1a1a1a;
            border: 1px solid rgba(0,0,0,0.03);
        }

        .right .bubble {
            background: linear-gradient(135deg, #9ee66b, #7ed34d);
            border-radius: 20px 20px 6px 20px;
            color: #111;
        }

        .message-footer {
            display: flex;
            margin-top: 3px;
            font-size: 10px;
            color: #8b8b8b;
        }

        .left .message-footer {
            justify-content: flex-start;
            padding-left: 8px;
        }

        .right .message-footer {
            justify-content: flex-end;
            padding-right: 4px;
        }

        .input-area {
            background-color: #f4f4f4;
            border-top: 1px solid #c2c2c2;
            padding: 12px 16px;
            display: flex;
            gap: 10px;
            align-items: center;
            flex-shrink: 0;
            padding-bottom: max(12px, env(safe-area-inset-bottom));
        }

        .input-wrapper {
            flex: 1;
            background-color: white;
            border-radius: 26px;
            padding: 8px 16px;
            border: 1px solid #bcbcbc;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.02);
            display: flex;
            align-items: center;
        }

        .input-wrapper input {
            border: none;
            outline: none;
            width: 100%;
            font-size: 16px;
            background: transparent;
            padding: 4px 0;
        }

        .input-wrapper input::placeholder {
            color: #adadad;
            font-weight: 400;
        }

        .send-btn {
            background-color: #1f8b4c;
            color: white;
            border: none;
            padding: 10px 24px;
            border-radius: 40px;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            border: 1px solid #106b36;
            white-space: nowrap;
            min-width: 70px;
            transition: opacity 0.1s;
        }

        .send-btn:active {
            opacity: 0.8;
        }

        .send-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .system-message {
            text-align: center;
            font-size: 11px;
            color: #888;
            margin: 5px 0;
            font-style: italic;
        }

        .error-message {
            text-align: center;
            font-size: 11px;
            color: #f44336;
            margin: 5px 0;
            background: rgba(244, 67, 54, 0.1);
            padding: 8px;
            border-radius: 8px;
            font-family: monospace;
        }

        @media (max-width: 500px) {
            body {
                padding: 0;
            }
            .chat-frame {
                width: 100%;
                height: 100%;
                max-height: 100vh;
                border-radius: 0;
            }
        }
    </style>
</head>
<body>
    <div class="chat-frame">
        <div class="simple-header">
            <span>💬 简·简</span>
            <span class="connection-status" id="status">连接中...</span>
        </div>

        <div class="chat-main" id="chatMain">
            <div class="time-label"><span>聊天开始</span></div>
        </div>

        <div class="input-area">
            <div class="input-wrapper">
                <input type="text" id="messageInput" placeholder="输入消息..." autocomplete="off" disabled>
            </div>
            <button class="send-btn" id="sendBtn" disabled>发送</button>
        </div>
    </div>

    <script>
        (function() {
            // DOM 元素
            const chatMain = document.getElementById('chatMain');
            const messageInput = document.getElementById('messageInput');
            const sendBtn = document.getElementById('sendBtn');
            const statusSpan = document.getElementById('status');
            
            // 设备标识
            let deviceId = null;
            let nickname = null;
            
            // WebSocket 连接
            let socket = null;
            let reconnectTimer = null;
            let reconnectAttempts = 0;
            const maxReconnectAttempts = 10;
            let isManualClose = false;

            // 生成或获取设备ID
            function getDeviceId() {
                let id = localStorage.getItem('device_id');
                if (!id) {
                    // 生成随机设备ID
                    id = 'device_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
                    localStorage.setItem('device_id', id);
                }
                return id;
            }

            // 获取或设置昵称
            function getNickname() {
                let name = localStorage.getItem('nickname');
                if (!name) {
                    name = '用户_' + Math.floor(Math.random() * 1000);
                    localStorage.setItem('nickname', name);
                }
                return name;
            }

            // 获取当前时间
            function getCurrentTime() {
                const now = new Date();
                return `${now.getHours().toString().padStart(2, '0')}:${now.getMinutes().toString().padStart(2, '0')}`;
            }

            // 添加自己的消息
            function appendMyMessage(content, timeStr = null) {
                const row = document.createElement('div');
                row.className = 'message-row right';
                
                const wrapper = document.createElement('div');
                wrapper.className = 'message-wrapper';
                
                const bubble = document.createElement('div');
                bubble.className = 'bubble';
                bubble.textContent = content;
                
                const footer = document.createElement('div');
                footer.className = 'message-footer';
                footer.textContent = timeStr || getCurrentTime();
                
                wrapper.appendChild(bubble);
                wrapper.appendChild(footer);
                row.appendChild(wrapper);
                chatMain.appendChild(row);
                
                // 滚动到底部
                chatMain.scrollTop = chatMain.scrollHeight;
            }

            // 添加对方的消息（不显示名字）
            function appendOtherMessage(content, timeStr) {
                const row = document.createElement('div');
                row.className = 'message-row left';
                
                const wrapper = document.createElement('div');
                wrapper.className = 'message-wrapper';
                
                const bubble = document.createElement('div');
                bubble.className = 'bubble';
                bubble.textContent = content;
                
                const footer = document.createElement('div');
                footer.className = 'message-footer';
                footer.textContent = timeStr;
                
                wrapper.appendChild(bubble);
                wrapper.appendChild(footer);
                row.appendChild(wrapper);
                chatMain.appendChild(row);
                
                chatMain.scrollTop = chatMain.scrollHeight;
            }

            // 添加系统消息
            function appendSystemMessage(text) {
                const msg = document.createElement('div');
                msg.className = 'system-message';
                msg.textContent = text;
                chatMain.appendChild(msg);
                chatMain.scrollTop = chatMain.scrollHeight;
            }

            // 添加错误消息（显示设备ID）
            function appendErrorMessage(text, deviceIdInfo = null) {
                const msg = document.createElement('div');
                msg.className = 'error-message';
                if (deviceIdInfo) {
                    msg.innerHTML = `${text}<br><strong style="font-size: 12px;">设备ID: ${deviceIdInfo}</strong>`;
                } else {
                    msg.textContent = text;
                }
                chatMain.appendChild(msg);
                chatMain.scrollTop = chatMain.scrollHeight;
            }

            // 更新连接状态
            function updateStatus(text, isConnected = false) {
                statusSpan.textContent = text;
                
                // 根据连接状态启用/禁用输入
                messageInput.disabled = !isConnected;
                sendBtn.disabled = !isConnected;
                
                if (isConnected) {
                    messageInput.placeholder = '输入消息...';
                } else {
                    messageInput.placeholder = text === '连接中...' ? '连接中...' : '连接断开...';
                }
            }

            // 建立WebSocket连接
            function connectWebSocket() {
                if (isManualClose) return;
                
                // 清除重连定时器
                if (reconnectTimer) {
                    clearTimeout(reconnectTimer);
                    reconnectTimer = null;
                }
                
                // 关闭现有连接
                if (socket) {
                    try {
                        socket.onopen = null;
                        socket.onmessage = null;
                        socket.onclose = null;
                        socket.onerror = null;
                        if (socket.readyState === WebSocket.OPEN) {
                            socket.close();
                        }
                    } catch (e) {
                        console.log('关闭旧连接出错:', e);
                    }
                    socket = null;
                }

                // 获取正确的WebSocket URL
                const host = window.location.host;
                const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
                const wsUrl = `${protocol}//${host}/ws`;
                
                console.log('正在连接WebSocket:', wsUrl);
                updateStatus('⏳ 连接中...', false);
                
                try {
                    socket = new WebSocket(wsUrl);
                } catch (e) {
                    console.error('创建WebSocket失败:', e);
                    updateStatus('🔴 失败', false);
                    scheduleReconnect();
                    return;
                }

                // 连接打开
                socket.onopen = function() {
                    console.log('WebSocket连接成功');
                    
                    // 发送设备信息
                    const deviceInfo = {
                        device_id: deviceId,
                        nickname: nickname
                    };
                    socket.send(JSON.stringify(deviceInfo));
                    
                    updateStatus('🟢 在线', true);
                    reconnectAttempts = 0;
                };

                // 接收消息
                socket.onmessage = function(event) {
                    try {
                        const data = JSON.parse(event.data);
                        
                        switch(data.type) {
                            case 'system':
                                appendSystemMessage(data.content);
                                break;
                                
                            case 'offline_messages':
                                // 显示离线消息，无提示
                                if (data.messages && data.messages.length > 0) {
                                    data.messages.forEach(msg => {
                                        appendOtherMessage(msg.content, msg.time_str);
                                    });
                                }
                                break;
                                
                            case 'message':
                                // 对方发来的消息
                                appendOtherMessage(data.content, data.time_str);
                                break;
                                
                            case 'unauthorized':
                                // 未授权设备，显示设备ID
                                isManualClose = true;
                                updateStatus('❌ 未授权', false);
                                appendErrorMessage(data.message, data.device_id);
                                if (socket) socket.close();
                                break;
                                
                            case 'error':
                                appendSystemMessage(data.content);
                                if (data.content.includes('聊天室已满')) {
                                    isManualClose = true;
                                    updateStatus('❌ 已满', false);
                                    if (socket) socket.close();
                                }
                                break;
                        }
                    } catch (e) {
                        console.error('解析消息失败:', e);
                    }
                };

                // 连接关闭
                socket.onclose = function(event) {
                    console.log('WebSocket连接关闭', event.code, event.reason);
                    
                    if (!isManualClose) {
                        updateStatus('🔴 离线', false);
                        
                        if (event.code !== 1000 && event.code !== 1008) {
                            appendSystemMessage('⚠️ 连接断开，正在重连...');
                        }
                        
                        scheduleReconnect();
                    }
                };

                // 连接错误
                socket.onerror = function(error) {
                    console.error('WebSocket错误:', error);
                };
            }

            // 安排重连
            function scheduleReconnect() {
                if (isManualClose) return;
                
                if (reconnectTimer) {
                    clearTimeout(reconnectTimer);
                }
                
                if (reconnectAttempts < maxReconnectAttempts) {
                    reconnectAttempts++;
                    const delay = Math.min(2000 * Math.pow(1.5, reconnectAttempts - 1), 60000);
                    console.log(`计划重连 (${reconnectAttempts}/${maxReconnectAttempts}) ${Math.round(delay/1000)}秒后`);
                    
                    reconnectTimer = setTimeout(() => {
                        console.log('尝试重连...');
                        connectWebSocket();
                    }, delay);
                } else {
                    appendSystemMessage('❌ 重连失败，请刷新页面');
                }
            }

            // 发送消息
            function sendMessage() {
                const text = messageInput.value.trim();
                
                if (!text) {
                    return;
                }
                
                if (!socket || socket.readyState !== WebSocket.OPEN) {
                    appendSystemMessage('⚠️ 连接已断开，正在重连...');
                    connectWebSocket();
                    return;
                }
                
                try {
                    // 立即显示自己的消息
                    appendMyMessage(text, getCurrentTime());
                    
                    // 发送到服务器
                    socket.send(JSON.stringify({
                        type: 'message',
                        content: text
                    }));
                    
                    messageInput.value = '';
                } catch (e) {
                    console.error('发送失败:', e);
                    appendSystemMessage('❌ 发送失败');
                }
            }

            // 初始化
            function init() {
                deviceId = getDeviceId();
                nickname = getNickname();
                
                console.log('设备ID:', deviceId);
                console.log('昵称:', nickname);
                
                // 事件监听
                sendBtn.addEventListener('click', sendMessage);
                
                messageInput.addEventListener('keypress', function(e) {
                    if (e.key === 'Enter') {
                        e.preventDefault();
                        sendMessage();
                    }
                });

                // 键盘弹出时滚动到底部
                messageInput.addEventListener('focus', function() {
                    setTimeout(() => {
                        chatMain.scrollTop = chatMain.scrollHeight;
                    }, 300);
                });

                // 窗口大小改变时
                let resizeTimer;
                window.addEventListener('resize', function() {
                    clearTimeout(resizeTimer);
                    resizeTimer = setTimeout(() => {
                        if (document.activeElement === messageInput) {
                            chatMain.scrollTop = chatMain.scrollHeight;
                        }
                    }, 100);
                });

                // 启动连接
                connectWebSocket();
            }

            // 页面关闭时标记手动关闭
            window.addEventListener('beforeunload', function() {
                isManualClose = true;
                if (socket) {
                    socket.close();
                }
            });

            // 启动
            init();
        })(); 
    </script>
</body>
</html>
