<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>极简微信 · 实时聊天</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        html, body {
            height: 100%;
            width: 100%;
            overflow: hidden;
            background: #d9d9d9;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 10px;
        }

        .chat-frame {
            width: 400px;
            height: 720px;
            max-height: 95vh;
            background-color: #f0f0f0;
            border-radius: 28px;
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.2);
            display: flex;
            flex-direction: column;
            border: 1px solid rgba(255, 255, 255, 0.3);
            overflow: hidden;
        }

        .simple-header {
            background-color: #1f8b4c;
            padding: 16px 18px;
            color: white;
            font-size: 20px;
            font-weight: 600;
            border-bottom: 1px solid #15733e;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
        }

        .connection-status {
            font-size: 12px;
            padding: 4px 10px;
            background-color: rgba(255,255,255,0.2);
            border-radius: 30px;
            font-weight: 400;
        }

        .chat-main {
            flex: 1;
            background-color: #e6e6e6;
            background-image: linear-gradient(145deg, #ebebeb 0%, #dfdfdf 100%);
            padding: 20px 14px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 18px;
            -webkit-overflow-scrolling: touch;
        }

        .time-label {
            text-align: center;
            font-size: 11px;
            color: #6f6f6f;
            margin: 5px 0;
        }
        .time-label span {
            background-color: rgba(200, 200, 200, 0.5);
            padding: 4px 14px;
            border-radius: 30px;
            backdrop-filter: blur(2px);
            font-weight: 500;
            display: inline-block;
        }

        .message-row {
            display: flex;
            width: 100%;
        }

        .message-row.left {
            justify-content: flex-start;
        }

        .message-row.right {
            justify-content: flex-end;
        }

        .message-wrapper {
            max-width: 280px;
        }

        .bubble {
            padding: 10px 16px;
            font-size: 15px;
            line-height: 1.5;
            word-wrap: break-word;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.07);
        }

        .left .bubble {
            background-color: #ffffff;
            border-radius: 20px 20px 20px 6px;
            color: #1a1a1a;
            border: 1px solid rgba(0,0,0,0.03);
        }

        .right .bubble {
            background: linear-gradient(135deg, #9ee66b, #7ed34d);
            border-radius: 20px 20px 6px 20px;
            color: #111;
        }

        .message-footer {
            display: flex;
            margin-top: 3px;
            font-size: 10px;
            color: #8b8b8b;
        }

        .left .message-footer {
            justify-content: flex-start;
            padding-left: 8px;
        }

        .right .message-footer {
            justify-content: flex-end;
            padding-right: 4px;
        }

        .input-area {
            background-color: #f4f4f4;
            border-top: 1px solid #c2c2c2;
            padding: 12px 16px;
            display: flex;
            gap: 10px;
            align-items: center;
            flex-shrink: 0;
            padding-bottom: max(12px, env(safe-area-inset-bottom));
        }

        .input-wrapper {
            flex: 1;
            background-color: white;
            border-radius: 26px;
            padding: 8px 16px;
            border: 1px solid #bcbcbc;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.02);
            display: flex;
            align-items: center;
        }

        .input-wrapper input {
            border: none;
            outline: none;
            width: 100%;
            font-size: 16px;
            background: transparent;
            padding: 4px 0;
        }

        .input-wrapper input::placeholder {
            color: #adadad;
            font-weight: 400;
        }

        .send-btn {
            background-color: #1f8b4c;
            color: white;
            border: none;
            padding: 10px 24px;
            border-radius: 40px;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            border: 1px solid #106b36;
            white-space: nowrap;
            min-width: 70px;
            transition: opacity 0.1s;
        }

        .send-btn:active {
            opacity: 0.8;
        }

        .send-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .system-message {
            text-align: center;
            font-size: 11px;
            color: #888;
            margin: 5px 0;
            font-style: italic;
        }

        @media (max-width: 500px) {
            body {
                padding: 0;
            }
            .chat-frame {
                width: 100%;
                height: 100%;
                max-height: 100vh;
                border-radius: 0;
            }
        }
    </style>
</head>
<body>
    <div class="chat-frame">
        <div class="simple-header">
            <span>💬 实时聊天</span>
            <span class="connection-status" id="status">连接中...</span>
        </div>

        <div class="chat-main" id="chatMain">
            <div class="time-label"><span>聊天开始</span></div>
        </div>

        <div class="input-area">
            <div class="input-wrapper">
                <input type="text" id="messageInput" placeholder="输入消息..." autocomplete="off" disabled>
            </div>
            <button class="send-btn" id="sendBtn" disabled>发送</button>
        </div>
    </div>

    <script>
        (function() {
            // DOM 元素
            const chatMain = document.getElementById('chatMain');
            const messageInput = document.getElementById('messageInput');
            const sendBtn = document.getElementById('sendBtn');
            const statusSpan = document.getElementById('status');
            
            // WebSocket 连接
            let socket = null;
            let reconnectTimer = null;
            let reconnectAttempts = 0;
            const maxReconnectAttempts = 10;

            // 获取当前时间
            function getCurrentTime() {
                const now = new Date();
                return `${now.getHours().toString().padStart(2, '0')}:${now.getMinutes().toString().padStart(2, '0')}`;
            }

            // 添加消息到界面
            function appendMessage(text, isSelf) {
                const row = document.createElement('div');
                row.className = `message-row ${isSelf ? 'right' : 'left'}`;
                
                const wrapper = document.createElement('div');
                wrapper.className = 'message-wrapper';
                
                const bubble = document.createElement('div');
                bubble.className = 'bubble';
                bubble.textContent = text;
                
                const footer = document.createElement('div');
                footer.className = 'message-footer';
                footer.textContent = getCurrentTime();
                
                wrapper.appendChild(bubble);
                wrapper.appendChild(footer);
                row.appendChild(wrapper);
                chatMain.appendChild(row);
                
                // 滚动到底部
                chatMain.scrollTop = chatMain.scrollHeight;
            }

            // 添加系统消息
            function appendSystemMessage(text) {
                const msg = document.createElement('div');
                msg.className = 'system-message';
                msg.textContent = text;
                chatMain.appendChild(msg);
                chatMain.scrollTop = chatMain.scrollHeight;
            }

            // 更新连接状态
            function updateStatus(text, color, isConnected = false) {
                statusSpan.textContent = text;
                if (color) {
                    statusSpan.style.backgroundColor = color;
                }
                
                // 根据连接状态启用/禁用输入
                messageInput.disabled = !isConnected;
                sendBtn.disabled = !isConnected;
                
                if (isConnected) {
                    messageInput.placeholder = '输入消息...';
                } else {
                    messageInput.placeholder = text === '连接中...' ? '连接中...' : '连接断开...';
                }
            }

            // 建立WebSocket连接
            function connectWebSocket() {
                // 清除重连定时器
                if (reconnectTimer) {
                    clearTimeout(reconnectTimer);
                    reconnectTimer = null;
                }
                
                // 关闭现有连接
                if (socket) {
                    try {
                        socket.onopen = null;
                        socket.onmessage = null;
                        socket.onclose = null;
                        socket.onerror = null;
                        if (socket.readyState === WebSocket.OPEN) {
                            socket.close();
                        }
                    } catch (e) {
                        console.log('关闭旧连接出错:', e);
                    }
                    socket = null;
                }

                // 获取正确的WebSocket URL
                const host = window.location.host;  // 自动获取当前IP和端口
                const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
                const wsUrl = `${protocol}//${host}/ws`;
                
                console.log('正在连接WebSocket:', wsUrl);
                updateStatus('⏳ 连接中...', 'rgba(255, 193, 7, 0.3)', false);
                
                try {
                    socket = new WebSocket(wsUrl);
                } catch (e) {
                    console.error('创建WebSocket失败:', e);
                    updateStatus('🔴 失败', 'rgba(231, 76, 60, 0.3)', false);
                    scheduleReconnect();
                    return;
                }

                // 连接打开
                socket.onopen = function() {
                    console.log('WebSocket连接成功');
                    updateStatus('🟢 在线', 'rgba(46, 204, 113, 0.3)', true);
                    appendSystemMessage('✅ 已连接到服务器');
                    reconnectAttempts = 0;  // 重置重连次数
                };

                // 接收消息
                socket.onmessage = function(event) {
                    try {
                        const data = JSON.parse(event.data);
                        appendMessage(data.message, data.isSelf);
                    } catch (e) {
                        console.error('解析消息失败:', e);
                    }
                };

                // 连接关闭
                socket.onclose = function(event) {
                    console.log('WebSocket连接关闭', event.code, event.reason);
                    updateStatus('🔴 离线', 'rgba(231, 76, 60, 0.3)', false);
                    
                    if (event.code !== 1000) {
                        appendSystemMessage('⚠️ 连接断开，正在重连...');
                    }
                    
                    scheduleReconnect();
                };

                // 连接错误
                socket.onerror = function(error) {
                    console.error('WebSocket错误:', error);
                };
            }

            // 安排重连
            function scheduleReconnect() {
                if (reconnectTimer) {
                    clearTimeout(reconnectTimer);
                }
                
                if (reconnectAttempts < maxReconnectAttempts) {
                    reconnectAttempts++;
                    // 指数退避：1s, 2s, 4s, 8s, ...
                    const delay = Math.min(1000 * Math.pow(2, reconnectAttempts - 1), 30000);
                    console.log(`计划重连 (${reconnectAttempts}/${maxReconnectAttempts}) ${delay}ms后`);
                    
                    reconnectTimer = setTimeout(() => {
                        console.log('尝试重连...');
                        connectWebSocket();
                    }, delay);
                } else {
                    appendSystemMessage('❌ 重连失败，请刷新页面');
                }
            }

            // 发送消息
            function sendMessage() {
                const text = messageInput.value.trim();
                
                if (!text) {
                    return;
                }
                
                if (!socket || socket.readyState !== WebSocket.OPEN) {
                    appendSystemMessage('⚠️ 连接已断开，正在重连...');
                    connectWebSocket();
                    return;
                }
                
                try {
                    socket.send(text);
                    messageInput.value = '';
                } catch (e) {
                    console.error('发送失败:', e);
                    appendSystemMessage('❌ 发送失败');
                    connectWebSocket();
                }
            }

            // 事件监听
            sendBtn.addEventListener('click', sendMessage);
            
            messageInput.addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    sendMessage();
                }
            });

            // 键盘弹出时滚动到底部
            messageInput.addEventListener('focus', function() {
                setTimeout(() => {
                    chatMain.scrollTop = chatMain.scrollHeight;
                }, 300);
            });

            // 窗口大小改变时（键盘弹出/收起）
            let resizeTimer;
            window.addEventListener('resize', function() {
                clearTimeout(resizeTimer);
                resizeTimer = setTimeout(() => {
                    if (document.activeElement === messageInput) {
                        chatMain.scrollTop = chatMain.scrollHeight;
                    }
                }, 100);
            });

            // 启动连接
            connectWebSocket();

            // 定期检查连接状态（兜底）
            setInterval(() => {
                if (socket && socket.readyState === WebSocket.OPEN) {
                    // 连接正常，不做操作
                } else if (socket && socket.readyState === WebSocket.CLOSED) {
                    console.log('检测到连接已关闭，尝试重连');
                    connectWebSocket();
                }
            }, 5000);
        })(); 
    </script>
</body>
</html>
